name: Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions: read-all

jobs:
  bandit:
    name: Bandit Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Set up Python
        uses: actions/setup-python@f677139bbe7f9c59b41e40162b753c062f5d49a3 # v5.1.1
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        # Scans recursively, skipping the tests/ directory
        run: bandit -r . -x ./tests/

  codeql:
    name: CodeQL Static Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@2e230e8c6da3e55c78475513ea0183664f3337a7 # v3.25.7
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@2e230e8c6da3e55c78475513ea0183664f3337a7 # v3.25.7

  semgrep:
    name: Semgrep Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Run Semgrep
        uses: semgrep/semgrep-action@a3f5a704040a4597b8364b4c73d2f97ebdf0a09e # v1
        with:
          config: p/python
