antigens:
  - HPV16_18_panel8
  - EBV_B95_8_panel8

proteome_files:
  HPV16_18_panel8: data/proteomes/HPV16_18_panel8.fasta
  EBV_B95_8_panel8: data/proteomes/EBV_B95_8_panel8.fasta
  # Legacy one-release alias
  EBV_panel8_B958: data/proteomes/EBV_B95_8_panel8.fasta

alleles:
  - HLA-A*02:01
  - HLA-A*01:01
  - HLA-A*03:01
  - HLA-A*24:02
  - HLA-A*11:01
  - HLA-B*07:02
  - HLA-B*08:01
  - HLA-B*27:05
  - HLA-B*35:01
  - HLA-B*44:02

peptide_lengths:
  - 8
  - 9
  - 10
  - 11

binding_backend: mhcflurry

# Feature mode: 21 (legacy sequence-only) or 30 (physico + multi-allele binding) or 50 (expanded)
feature_mode: 30

# Model path — set to 30-feature RF by default; alternatives:
#   models/rf_21feature_legacy.joblib        (21-feature legacy RF)
#   models/rf_30feature_integrated.joblib    (30-feature RF canonical)
#   models/rf_50feature_integrated.joblib    (50-feature RF expanded)
#   models/ann_30feature_integrated.pt       (30-feature PyTorch ANN)
#   models/xgb_30feature_integrated.joblib   (30-feature XGBoost)
model_path: models/rf_30feature_integrated.joblib

# Freeze mode turns usability guardrails into hard errors for release-grade runs.
# Keep false for exploratory development; enable true before evidence freeze.
# Currently true: external validation prep phase (see 00_Active/SESTRAV_External_Validation_PRIME_PredIG_Plan.md).
# Set to false for day-to-day development, or override per-run: snakemake --config freeze_mode=true
freeze_mode: true

# Calibration and thresholds (used by Stage 4 when present)
calibration_path: models/platt_calibrator.joblib
thresholds_path: models/optimal_thresholds.json

# Binding matrix for 30-feature training
binding_matrix_path: models/peptide_binding_matrix_v3.csv

# MC Dropout uncertainty (PyTorch ANN only)
mc_dropout: false

# Dataset Version Governance
dataset_governance:
  current_version: "2.0.0-alpha"
  versions:
    "v2.0": "IEDB-20260424-EBV_HPV16_UPDATED-v2"
    "v2.1": "IEDB-20260521-EXPANDED-v2.1"
    "2.0.0-alpha": "SESTRAV_2.0_EXPANSION"
  provenance:
    timestamp: "2026-05-21T00:00:00Z"
    source_databases: ["IEDB", "VDJdb"]
    negative_sampling_strategy: "high-binding_decoy"
    checksum: "pending"
  qc_thresholds:
    min_peptide_yield: 500
    max_conflict_ratio: 0.15
  require_checksum_match_in_freeze_mode: true

# Interpretation metadata for summary artifact naming
dataset_mode: expansion_alpha
dataset_version: 2.0.0-alpha

output_dir: results
